/* =====================================
   PARTICLE ENGINE PREMIUM
===================================== */

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener("resize",resizeCanvas);

const particles=[];

for(let i=0;i<120;i++){

    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*3+1,
        dx:(Math.random()-0.5)*0.7,
        dy:(Math.random()-0.5)*0.7
    });

}

function animateParticles(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    particles.forEach(p=>{

        ctx.beginPath();
        ctx.arc(
            p.x,
            p.y,
            p.r,
            0,
            Math.PI*2
        );

        ctx.fillStyle=
        "rgba(0,229,255,.8)";

        ctx.fill();

        p.x+=p.dx;
        p.y+=p.dy;

        if(p.x<0 || p.x>canvas.width)
        p.dx*=-1;

        if(p.y<0 || p.y>canvas.height)
        p.dy*=-1;

    });

    requestAnimationFrame(
        animateParticles
    );

}

animateParticles();

/* =====================================
   START TEST
===================================== */

function startTest(){

    document
    .getElementById("hero")
    .style.display="none";

    document
    .getElementById("quizPage")
    .style.display="block";

    loadQuestion();

}


/* =====================================
   LOAD QUESTION
===================================== */

function loadQuestion(){

    if(currentQuestion >= questions.length){

        showResult();

        return;
    }

    const q =
    questions[currentQuestion];

    document
    .getElementById("counter")
    .innerHTML=
    `Soal ${currentQuestion+1}
     / ${questions.length}`;

    document
    .getElementById("type")
    .innerHTML=q.type;

    document
    .getElementById("question")
    .innerHTML=q.question;

    document
    .getElementById("progress")
    .style.width=
    (
        currentQuestion/
        questions.length
        *100
    )+"%";

    const answersBox =
    document.getElementById(
        "answers"
    );

    answersBox.innerHTML="";

    q.options.forEach(
        (option,index)=>{

        const div=
        document.createElement(
            "div"
        );

        div.className=
        "option";

        div.innerHTML=
        option;

        div.onclick=
        ()=>selectAnswer(index);

        answersBox.appendChild(
            div
        );

    });

}


/* =====================================
   SELECT ANSWER
===================================== */

function selectAnswer(answerIndex){

    const q=
    questions[currentQuestion];

    answers.push(answerIndex);

    calculateScore(
        q,
        answerIndex
    );

    currentQuestion++;

    loadQuestion();

}


/* =====================================
   SCORING ENGINE
===================================== */

function calculateScore(
    question,
    answer
){

    if(
        question.type==="MBTI"
    ){

        mbtiScore+=
        (3-answer);

    }

    if(
        question.type==="DISC"
    ){

        discScore+=
        (3-answer);

    }

    if(
        question.type==="IQ"
    ){

        if(
            answer===
            question.correct
        ){

            iqScore++;

        }

    }

}


/* =====================================
   RESULT ENGINE
===================================== */

function showResult(){

    document
    .getElementById(
        "quizPage"
    )
    .style.display="none";

    document
    .getElementById(
        "resultPage"
    )
    .style.display="block";

    let mbtiType="ENTJ";

    if(mbtiScore<30)
    mbtiType="INFP";

    else if(mbtiScore<50)
    mbtiType="INFJ";

    else if(mbtiScore<70)
    mbtiType="ENFP";

    else if(mbtiScore<90)
    mbtiType="INTJ";

    else
    mbtiType="ENTJ";


    let discType="Dominance";

    if(discScore<25)
    discType="Compliance";

    else if(discScore<45)
    discType="Steadiness";

    else if(discScore<70)
    discType="Influence";

    else
    discType="Dominance";


    let iqResult=
    Math.round(
        80+
        (iqScore*2)
    );

    document
    .getElementById(
        "mbtiResult"
    )
    .innerHTML=
    mbtiType;

    document
    .getElementById(
        "discResult"
    )
    .innerHTML=
    discType;

    document
    .getElementById(
        "iqResult"
    )
    .innerHTML=
    iqResult;

}


/* =====================================
   TIMER
===================================== */

let totalTime=
45*60;

const timer=
setInterval(()=>{

    const min=
    Math.floor(
        totalTime/60
    );

    const sec=
    totalTime%60;

    document
    .getElementById(
        "timer"
    )
    .innerHTML=
    String(min)
    .padStart(2,'0')
    +":"+
    String(sec)
    .padStart(2,'0');

    if(totalTime>0){

        totalTime--;

    }else{

        clearInterval(
            timer
        );

        showResult();

    }

},1000);


/* =====================================
   SHUFFLE
===================================== */

function shuffleQuestions(){

    questions.sort(
        ()=>Math.random()-0.5
    );

}
