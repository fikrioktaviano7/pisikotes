<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psychology Master Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#070b17;
color:white;
overflow-x:hidden;
min-height:100vh;
}

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.glass{
background:rgba(255,255,255,.08);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.1);
box-shadow:0 8px 32px rgba(0,0,0,.3);
}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.hero-box{
width:100%;
max-width:900px;
padding:50px;
border-radius:30px;
text-align:center;
}

.logo{
font-size:70px;
margin-bottom:20px;
}

.hero h1{
font-size:55px;
margin-bottom:20px;
background:linear-gradient(90deg,#00e5ff,#00ff95);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
opacity:.8;
line-height:1.8;
margin-bottom:35px;
}

.btn{
padding:15px 35px;
border:none;
border-radius:15px;
background:linear-gradient(90deg,#00e5ff,#00ff95);
font-size:18px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:translateY(-4px);
}

.quiz-container{
display:none;
max-width:1000px;
margin:auto;
padding:30px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.progress{
height:15px;
background:#1b2135;
border-radius:20px;
overflow:hidden;
margin-bottom:30px;
}

.progress-fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#00e5ff,#00ff95);
transition:.5s;
}

.question-card{
padding:30px;
border-radius:25px;
}

.question-type{
display:inline-block;
padding:8px 15px;
background:#00e5ff20;
border-radius:20px;
margin-bottom:20px;
}

.question{
font-size:25px;
margin-bottom:30px;
line-height:1.6;
}

.option{
padding:18px;
margin-bottom:15px;
border-radius:15px;
cursor:pointer;
background:#ffffff08;
transition:.3s;
}

.option:hover{
background:#00e5ff25;
transform:translateX(10px);
}

.timer{
font-size:22px;
font-weight:bold;
color:#00ff95;
}

.result-page{
display:none;
max-width:1200px;
margin:auto;
padding:30px;
}

.result-card{
padding:40px;
border-radius:30px;
text-align:center;
}

.score-box{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.score{
padding:30px;
border-radius:20px;
background:#ffffff08;
}

.score h3{
font-size:35px;
margin-top:10px;
}

@media(max-width:768px){

.hero h1{
font-size:35px;
}

.logo{
font-size:50px;
}

.question{
font-size:20px;
}

}

</style>
</head>
<body>

<canvas id="particles"></canvas>

<section class="hero" id="hero">

<div class="hero-box glass">

<div class="logo">🧠</div>

<h1>Psychology Master Pro</h1>

<p>
Tes psikologi profesional dengan metode MBTI,
DISC dan IQ Assessment.
</p>

<button class="btn" onclick="startTest()">
Mulai Tes
</button>

</div>

</section>

<section class="quiz-container" id="quizPage">

<div class="topbar">

<div id="counter">
Soal 1 / 150
</div>

<div class="timer" id="timer">
45:00
</div>

</div>

<div class="progress">
<div class="progress-fill" id="progress"></div>
</div>

<div class="question-card glass">

<div class="question-type" id="type">
MBTI
</div>

<div class="question" id="question">
...
</div>

<div id="answers"></div>

</div>

</section>

<section class="result-page" id="resultPage">

<div class="result-card glass">

<h1>Hasil Analisis</h1>

<p>
Analisis psikotes profesional
</p>

<div class="score-box">

<div class="score">
MBTI
<h3 id="mbtiResult">-</h3>
</div>

<div class="score">
DISC
<h3 id="discResult">-</h3>
</div>

<div class="score">
IQ
<h3 id="iqResult">-</h3>
</div>

</div>

</div>

</section>

<script>

/* PARTICLE BACKGROUND */

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#00e5ff";
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;

});

requestAnimationFrame(animate);

}

animate();

/* SOAL */

const questions = [

{
type:"MBTI",
question:"Saya lebih senang berada di keramaian dibanding sendiri.",
options:["Sangat Setuju","Setuju","Tidak Setuju","Sangat Tidak Setuju"],
mbti:"E"
},

{
type:"MBTI",
question:"Saya lebih suka merencanakan daripada spontan.",
options:["Sangat Setuju","Setuju","Tidak Setuju","Sangat Tidak Setuju"],
mbti:"J"
},

{
type:"DISC",
question:"Saya suka memimpin kelompok.",
options:["Sangat Setuju","Setuju","Tidak Setuju","Sangat Tidak Setuju"],
disc:"D"
},

{
type:"IQ",
question:"2,4,8,16, ?",
options:["18","24","32","64"],
correct:2
}

];

/* NANTI DITAMBAHKAN MENJADI 150 SOAL */

let current=0;

function startTest(){

document.getElementById("hero").style.display="none";
document.getElementById("quizPage").style.display="block";

loadQuestion();

}

function loadQuestion(){

const q=questions[current];

document.getElementById("counter").innerHTML=
"Soal "+(current+1)+" / 150";

document.getElementById("type").innerHTML=q.type;

document.getElementById("question").innerHTML=q.question;

document.getElementById("progress").style.width=
((current/150)*100)+"%";

const answers=document.getElementById("answers");
answers.innerHTML="";

q.options.forEach((opt,index)=>{

const div=document.createElement("div");

div.className="option";

div.innerHTML=opt;

div.onclick=()=>nextQuestion(index);

answers.appendChild(div);

});

}

function nextQuestion(answer){

current++;

if(current>=questions.length){

showResult();
return;

}

loadQuestion();

}

function showResult(){

document.getElementById("quizPage").style.display="none";
document.getElementById("resultPage").style.display="block";

document.getElementById("mbtiResult").innerHTML="ENTJ";
document.getElementById("discResult").innerHTML="Dominance";
document.getElementById("iqResult").innerHTML="118";

}

/* TIMER */

let totalTime=45*60;

setInterval(()=>{

let min=Math.floor(totalTime/60);
let sec=totalTime%60;

document.getElementById("timer").innerHTML=
String(min).padStart(2,'0')+
":"+
String(sec).padStart(2,'0');

if(totalTime>0) totalTime--;

},1000);

</script>

</body>
</html>
