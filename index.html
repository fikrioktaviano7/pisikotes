/* PARTICLE BACKGROUND */

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#00e5ff";
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;

});

requestAnimationFrame(animate);

}

/* NANTI DITAMBAHKAN MENJADI 150 SOAL */

let current=0;

function startTest(){

document.getElementById("hero").style.display="none";
document.getElementById("quizPage").style.display="block";

loadQuestion();

}

function loadQuestion(){

const q=questions[current];

document.getElementById("counter").innerHTML=
"Soal "+(current+1)+" / 150";

document.getElementById("type").innerHTML=q.type;

document.getElementById("question").innerHTML=q.question;

document.getElementById("progress").style.width=
((current/150)*100)+"%";

const answers=document.getElementById("answers");
answers.innerHTML="";

q.options.forEach((opt,index)=>{

const div=document.createElement("div");

div.className="option";

div.innerHTML=opt;

div.onclick=()=>nextQuestion(index);

answers.appendChild(div);

});

}

function nextQuestion(answer){

current++;

if(current>=questions.length){

showResult();
return;

}

loadQuestion();

}

function showResult(){

document.getElementById("quizPage").style.display="none";
document.getElementById("resultPage").style.display="block";

document.getElementById("mbtiResult").innerHTML="ENTJ";
document.getElementById("discResult").innerHTML="Dominance";
document.getElementById("iqResult").innerHTML="118";

}

/* TIMER */

let totalTime=45*60;

setInterval(()=>{

let min=Math.floor(totalTime/60);
let sec=totalTime%60;

document.getElementById("timer").innerHTML=
String(min).padStart(2,'0')+
":"+
String(sec).padStart(2,'0');

if(totalTime>0) totalTime--;

},1000);

</script>
